<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Last Z: Capital Mud-Fill Optimizer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #d4d4d4; padding: 20px; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h3 { color: #ce9178; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .aln-row { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { background: #252526; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; }
        .setting-group { margin: 15px 0; padding: 10px; background: #2a2a2a; border-radius: 6px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-gen { background: #3794ff; color: white; }
        .btn-reset { background: #444; color: #eee; }
        canvas { background: #000; border: 1px solid #444; border-radius: 8px; width: 100%; height: 500px; }
        .scroll-box { max-height: 300px; overflow-y: auto; margin-top: 15px; background: #181818; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; }
        .coord-val { font-family: monospace; color: #d7ba7d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>Deployment Settings</h3>
        
        <div class="setting-group">
            <label style="display:block; margin-bottom:5px; font-size:0.9em;">HQ Spacing (Buffer):</label>
            <select id="spacingSelect" style="width:100%">
                <option value="1">Tight (1 Tile Gap - Max Fill)</option>
                <option value="2" selected>Medium (2 Tile Gap)</option>
                <option value="3">Loose (3 Tile Gap)</option>
            </select>
        </div>

        <div id="allianceInputs"></div>
        
        <div class="btn-group">
            <button class="btn-gen" onclick="calculate()">Generate Map</button>
            <button class="btn-reset" onclick="resetApp()">Reset</button>
        </div>
    </div>

    <div class="panel">
        <canvas id="mapCanvas" width="600" height="600"></canvas>
        <div class="scroll-box">
            <table id="resultsTable">
                <thead><tr><th>Alliance</th><th>HQ #</th><th>Coord (X,Y)</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const MUD = [{x:482,y:465},{x:517,y:465},{x:535,y:500},{x:517,y:535},{x:482,y:535},{x:465,y:500}];
const FORBIDDEN = [{x:491,y:483},{x:508,y:483},{x:517,y:500},{x:508,y:517},{x:491,y:517},{x:483,y:500}];
const BLOCKED = [{x:483,y:500},{x:491,y:517},{x:517,y:500},{x:489,y:485},{x:489,y:484},{x:489,y:483},{x:490,y:482},{x:490,y:481},{x:491,y:481},{x:493,y:481},{x:489,y:515}];

function isInside(x, y, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        let xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
        if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
}

function init() {
    const container = document.getElementById('allianceInputs');
    container.innerHTML = "";
    for(let i=1; i<=6; i++) {
        container.innerHTML += `<div class="aln-row"><input type="text" id="n${i}" placeholder="Alliance ${i}"><input type="number" id="c${i}" placeholder="Qty"></div>`;
    }
}

function calculate() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = "";
    const gap = parseInt(document.getElementById('spacingSelect').value);
    const step = 2 + gap; // 2x2 footprint + chosen gap
    
    let spots = [];
    for (let y = 465; y <= 535; y += step) {
        for (let x = 465; x <= 535; x += step) {
            const fitsMud = isInside(x,y,MUD) && isInside(x+1,y,MUD) && isInside(x,y+1,MUD) && isInside(x+1,y+1,MUD);
            const hitsCenter = isInside(x,y,FORBIDDEN) || isInside(x+1,y,FORBIDDEN) || isInside(x,y+1,FORBIDDEN) || isInside(x+1,y+1,FORBIDDEN);
            const hitsBlocked = BLOCKED.some(p => (p.x >= x && p.x <= x+1) && (p.y >= y && p.y <= y+1));

            if (fitsMud && !hitsCenter && !hitsBlocked) {
                spots.push({x, y});
            }
        }
    }

    let spotIdx = 0, drawData = [];
    for (let i = 1; i <= 6; i++) {
        const name = document.getElementById(`n${i}`).value || `Aln ${i}`;
        const qty = parseInt(document.getElementById(`c${i}`).value) || 0;
        const color = `hsl(${(i * 60) % 360}, 65%, 50%)`;
        for (let j = 0; j < qty; j++) {
            if (spotIdx < spots.length) {
                const s = spots[spotIdx++];
                tbody.innerHTML += `<tr><td>${name}</td><td>#${j+1}</td><td class="coord-val">${s.x}, ${s.y}</td></tr>`;
                drawData.push({...s, color});
            }
        }
    }
    render(drawData);
}

function render(data) {
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const s = 8, o = 460;
    ctx.clearRect(0,0,600,600);

    const drawPoly = (poly, color, fill) => {
        ctx.beginPath();
        poly.forEach((p, i) => { if(i===0) ctx.moveTo((p.x-o)*s, (p.y-o)*s); else ctx.lineTo((p.x-o)*s, (p.y-o)*s); });
        ctx.closePath();
        if(fill) { ctx.fillStyle = fill; ctx.fill(); }
        ctx.strokeStyle = color; ctx.stroke();
    };

    drawPoly(MUD, "#444", "rgba(50,50,50,0.2)");
    drawPoly(FORBIDDEN, "#ff4444", "rgba(255,0,0,0.1)");

    data.forEach(p => {
        let cx = (p.x + 1 - o) * s;
        let cy = (p.y + 1 - o) * s;
        let radius = 1.3 * s; 
        ctx.fillStyle = p.color;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            ctx.lineTo(cx + radius * Math.cos(i * Math.PI / 3), cy + radius * Math.sin(i * Math.PI / 3));
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.stroke();
    });
}

function resetApp() { init(); document.getElementById('tableBody').innerHTML = ""; render([]); }
init();
render([]);
</script>
</body>
</html>

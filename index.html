<!DOCTYPE html>
<html>
<head>
    <title>Last Z: Capital Optimizer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 15px; max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .aln-grid { display: block; border-bottom: 1px solid #333; padding: 10px 0; }
        .input-group { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        label { font-size: 0.8em; color: #888; font-weight: bold; }
        input { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 4px; }
        .name-in { flex: 3; }
        .qty-in { flex: 1; min-width: 60px; }
        .ord-in { flex: 1; min-width: 50px; }
        .controls { position: sticky; top: 0; background: #121212; padding: 10px 0; z-index: 100; border-bottom: 1px solid #444; margin-bottom: 20px; }
        button { padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 48%; font-size: 1em; }
        .btn-gen { background: #007bff; color: white; }
        .btn-reset { background: #444; color: white; margin-left: 2%; }
        canvas { background: #000; border: 2px solid #00ff00; width: 100%; height: auto; border-radius: 8px; margin: 20px 0; }
        .results { background: #000; padding: 10px; border-radius: 4px; border: 1px solid #333; max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
        .coord { color: #00ff00; font-family: monospace; }
    </style>
</head>

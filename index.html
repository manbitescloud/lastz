<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Last Z Mud Filler</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="app-header">
        <div class="header-copy">
          <p class="eyebrow">Last Z</p>
          <h1>Mud Filler</h1>
          <p class="subhead">Server vs. Server capital mud fill planner</p>
        </div>
        <div class="capital-card" aria-label="Capital building reference">
          <img src="image.png" alt="Last Z capital building" id="capital-image" onerror="this.hidden=true" />
          <div class="capital-fallback" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </header>

      <main class="planner-layout">
        <section class="control-panel" aria-labelledby="planner-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Defense Setup</p>
              <h2 id="planner-title">Alliance Requests</h2>
            </div>
            <button class="icon-button" id="reset-button" type="button" title="Reset planner" aria-label="Reset planner">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M3 6h18"></path>
                <path d="M8 6V4h8v2"></path>
                <path d="M6 6l1 14h10l1-14"></path>
              </svg>
            </button>
          </div>

          <div class="server-row">
            <label>
              Server (Required Field)
              <input id="server-number" type="number" inputmode="numeric" min="1" placeholder="Example: 1024" required />
            </label>
          </div>

          <div class="alliance-list" id="alliance-list"></div>

          <div class="actions-row">
            <button class="secondary-button" id="add-alliance" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
              Alliance
            </button>
            <button class="primary-button" id="generate-plan" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 12h16"></path>
                <path d="M14 6l6 6-6 6"></path>
              </svg>
              Generate Fill
            </button>
            <button class="secondary-button" id="optimize-further" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 7h-9"></path>
                <path d="M14 17H4"></path>
                <path d="M17 4l3 3-3 3"></path>
                <path d="M7 14l-3 3 3 3"></path>
              </svg>
              <span id="optimize-label">Optimize Further</span>
            </button>
            <button class="secondary-button" id="fill-gaps" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
                <path d="M7 7l10 10"></path>
                <path d="M17 7L7 17"></path>
              </svg>
              <span id="fill-gaps-label">Fill Gaps</span>
            </button>
          </div>

          <dl class="stat-grid" id="stat-grid"></dl>
        </section>

        <section class="map-panel" aria-labelledby="map-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Capital Mud</p>
              <h2 id="map-title">Fill Map</h2>
            </div>
            <div class="map-tools">
              <button class="icon-button" id="copy-coords" type="button" title="Copy coordinates" aria-label="Copy coordinates">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M8 8h10v12H8z"></path>
                  <path d="M6 16H4V4h12v2"></path>
                </svg>
              </button>
              <button class="icon-button" id="download-map" type="button" title="Download map JPG" aria-label="Download map JPG">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <path d="M7 10l5 5 5-5"></path>
                  <path d="M12 15V3"></path>
                </svg>
              </button>
              <button class="secondary-button map-toggle-button" id="toggle-enemy" type="button">Show Enemy Placements</button>
              <button class="icon-button" id="download-config" type="button" title="Download configuration" aria-label="Download configuration">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <path d="M14 2v6h6"></path>
                  <path d="M12 18v-6"></path>
                  <path d="M9 15l3 3 3-3"></path>
                </svg>
              </button>
              <button class="icon-button" id="upload-config" type="button" title="Upload configuration" aria-label="Upload configuration">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <path d="M14 2v6h6"></path>
                  <path d="M12 12v6"></path>
                  <path d="M9 15l3-3 3 3"></path>
                </svg>
              </button>
              <input id="config-file" type="file" accept="application/json,.json" hidden />
            </div>
          </div>

          <div class="legend" id="legend"></div>

          <div class="map-frame" aria-label="Fill map viewport. Click once to enable zoom and pan.">
            <svg id="mud-svg" viewBox="456 456 88 88" role="img" aria-label="Generated mud fill placement map">
              <defs>
                <filter id="tile-glow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation=".65" result="blur"></feGaussianBlur>
                  <feMerge>
                    <feMergeNode in="blur"></feMergeNode>
                    <feMergeNode in="SourceGraphic"></feMergeNode>
                  </feMerge>
                </filter>
              </defs>
              <g id="mud-layer"></g>
            </svg>
          </div>

          <div class="download-fallback" id="download-fallback" hidden></div>
        </section>

        <section class="output-panel" aria-labelledby="output-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Share Sheet</p>
              <h2 id="output-title">Generated Coordinates</h2>
            </div>
          </div>
          <div class="assignment-table" id="assignment-table"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
<body>
  <div id="game-map" style="width: 1000px; height: 1000px; background: #222; position: relative;">
      </div>

  <script>
    const SIZE = 35; // The scale of your hexes

    // THE LOGIC: Snapping the click to the grid
    function getTeleportCoord(mouseX, mouseY) {
        let q = (2/3 * mouseX) / SIZE;
        let r = (-1/3 * mouseX + Math.sqrt(3)/3 * mouseY) / SIZE;

        let hexQ = Math.round(q);
        let hexR = Math.round(r);

        let snapX = SIZE * (3/2 * hexQ);
        let snapY = SIZE * (Math.sqrt(3)/2 * hexQ + Math.sqrt(3) * hexR);

        return { x: Math.floor(snapX), y: Math.floor(snapY) };
    }

    // THE INTERACTION: Listen for the click
    const map = document.getElementById('game-map');
    
    map.addEventListener('click', (e) => {
        const rect = map.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const coords = getTeleportCoord(mouseX, mouseY);
        
        console.log(`Teleport to: X=${coords.x}, Y=${coords.y}`);
        alert(`Exact Teleport Coordinates: ${coords.x}, ${coords.y}`);
    });
  </script>
</body>
</html>

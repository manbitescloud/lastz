<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Last Z: Capital Mud-Fill Optimizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #d4d4d4; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { color: #ce9178; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        .aln-row { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; margin-bottom: 12px; align-items: center; }
        input { background: #252526; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 0.9em; }
        button { background: #3794ff; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: 0.2s; }
        button:hover { background: #1e70d1; }
        canvas { background: #000; border: 1px solid #444; border-radius: 8px; width: 100%; display: block; }
        #resultsTable { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; font-size: 0.85em; }
        th { background: #2d2d2d; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .coord-val { font-family: 'Courier New', monospace; font-weight: bold; color: #d7ba7d; }
        .scroll-box { max-height: 400px; overflow-y: auto; margin-top: 15px; border-radius: 8px; background: #181818; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>Deployment Data</h3>
        <div id="allianceInputs"></div>
        <button onclick="calculate()">Generate Map & List</button>
        <p style="font-size: 0.8em; color: #666; margin-top: 15px;">
            * Optimized for 2x2 HQs with a 1-tile gap to prevent enemy teleports.
        </p>
    </div>

    <div class="panel">
        <canvas id="mapCanvas" width="600" height="600"></canvas>
        <div class="scroll-box">
            <table id="resultsTable">
                <thead><tr><th>Alliance</th><th>HQ #</th><th>Coord (X,Y)</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const MUD_BOUNDS = [{x:482,y:465},{x:517,y:465},{x:535,y:500},{x:517,y:535},{x:482,y:535},{x:465,y:500}];
const FORBIDDEN_HEX = [{x:491,y:483},{x:508,y:483},{x:517,y:500},{x:508,y:517},{x:491,y:517},{x:483,y:500}];

// Specific forbidden tile coordinates
const BLOCKED_TILES = [
    {x:483,y:500},{x:491,y:517},{x:517,y:500}, // Core points
    {x:489,y:485},{x:489,y:484},{x:489,y:483},{x:490,y:482},{x:490,y:481},{x:491,y:481},{x:493,y:481}, // Top-Left Protrusion
    {x:489,y:515} // Bottom-Left Protrusion
];

function isInside(x, y, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        let xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
        if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
}

function init() {
    const container = document.getElementById('allianceInputs');
    for(let i=1; i<=6; i++) {
        container.innerHTML += `
            <div class="aln-row">
                <input type="text" id="n${i}" placeholder="Alliance ${i} Name">
                <input type="number" id="c${i}" placeholder="Qty" min="0">
            </div>`;
    }
}

function calculate() {
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = "";
    const hqSize = 2;
    const gap = 1;
    const step = hqSize + gap;
    
    let validSpots = [];
    // Scan Mud area from top to bottom
    for (let y = 465; y <= 535; y += step) {
        for (let x = 465; x <= 535; x += step) {
            // Check if top-left anchor is in mud and NOT in center forbidden zone
            if (isInside(x, y, MUD_BOUNDS) && !isInside(x, y, FORBIDDEN_HEX)) {
                
                // Collision check for the 2x2 footprint against blocked coordinates
                let collision = BLOCKED_TILES.some(p => (p.x >= x && p.x < x+2) && (p.y >= y && p.y < y+2));
                
                if (!collision) validSpots.push({x, y});
            }
        }
    }

    let spotIdx = 0;
    let visualData = [];

    for (let i = 1; i <= 6; i++) {
        const name = document.getElementById(`n${i}`).value || `Alliance ${i}`;
        const count = parseInt(document.getElementById(`c${i}`).value) || 0;
        const color = `hsl(${(i * 55) % 360}, 60%, 55%)`;

        for (let j = 0; j < count; j++) {
            if (spotIdx < validSpots.length) {
                const s = validSpots[spotIdx];
                tableBody.innerHTML += `<tr><td>${name}</td><td>#${j+1}</td><td class="coord-val">${s.x}, ${s.y}</td></tr>`;
                visualData.push({...s, color});
                spotIdx++;
            }
        }
    }
    renderMap(visualData);
}

function renderMap(data) {
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const scale = 8, off = 460;
    ctx.clearRect(0, 0, 600, 600);

    const path = (poly) => {
        ctx.beginPath();
        poly.forEach((p, i) => {
            let px = (p.x - off) * scale, py = (p.y - off) * scale;
            if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.closePath();
    };

    // Draw Outer Mud
    path(MUD_BOUNDS); ctx.strokeStyle = "#333"; ctx.stroke();
    // Draw Forbidden Center
    path(FORBIDDEN_HEX); ctx.fillStyle = "#221111"; ctx.fill(); ctx.strokeStyle = "#ff4444"; ctx.stroke();

    // Draw HQs
    data.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect((p.x - off) * scale, (p.y - off) * scale, 2 * scale, 2 * scale);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.strokeRect((p.x - off) * scale, (p.y - off) * scale, 2 * scale, 2 * scale);
    });
}

init();
</script>
</body>
</html>
